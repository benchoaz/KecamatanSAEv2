server {
    listen 80;
    server_name localhost; # Replace with your domain

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ================================
    # API Endpoint (HTTP - for internal Docker use)
    # ================================
    location /api/ {
        proxy_pass http://dashboard-kecamatan-nginx:80/api/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name localhost; # Replace with your domain

    ssl_certificate /etc/letsencrypt/live/localhost/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/localhost/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ================================
    # Health Check
    # ================================
    location /health {
        return 200 "OK - NGINX GATEWAY (SSL)\n";
        add_header Content-Type text/plain;
    }

    # ================================
    # Dashboard Kecamatan (Laravel)
    # ================================
    location / {
        proxy_pass http://dashboard-kecamatan-nginx:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ================================
    # WhatsApp Handle API - Route to Dashboard
    # ================================
    location /api/whatsapp/ {
        proxy_pass http://dashboard-kecamatan-nginx:80/api/whatsapp/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
    }

    # ================================
    # WhatsApp API Gateway (disabled - using dashboard instead)
    # ================================
    # location /api/whatsapp-old/ {
    #     proxy_pass http://whatsapp-api-gateway:8001/api/;
    #     proxy_http_version 1.1;

    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # ================================
    # n8n UI & Webhooks
    # ================================
    location /n8n/ {
        proxy_pass http://n8n-kecamatan:5678/;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ================================
    # WAHA Webhooks (for n8n)
    # ================================
    location /webhook/ {
        proxy_pass http://n8n-kecamatan:5678/webhook/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
